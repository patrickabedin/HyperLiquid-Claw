[program:hyperliquid-mcp]
directory=/opt/hyperliquid-mcp
command=/opt/hyperliquid-mcp/venv/bin/uvicorn app:app --host 0.0.0.0 --port 8000
autostart=true
autorestart=true
stderr_logfile=/var/log/hyperliquid-mcp.err.log
stdout_logfile=/var/log/hyperliquid-mcp.out.log
environment=PATH="/opt/hyperliquid-mcp/venv/bin"
